<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réservations — Proper Sofa Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Navigation ── -->
<nav class="nav">
  <a class="nav-logo" href="dashboard.html">
    <img src="asset/LOGO.svg" alt="Proper Sofa" />
    <span class="nav-badge">Admin</span>
  </a>
  <div class="nav-right" id="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn btn-ghost btn-sm" id="logout-btn">Déconnexion</button>
  </div>
  <button class="burger-btn" id="burger-btn" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ── Main ── -->
<main class="page-wrap">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">Réservations</h1>
      <p class="page-subtitle" id="last-refresh"></p>
    </div>
    <button class="btn btn-secondary" id="refresh-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Actualiser
    </button>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">En attente</div>
      <div class="stat-value" id="stat-pending" style="color:var(--warning)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Acceptées</div>
      <div class="stat-value" id="stat-accepted" style="color:var(--success)">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="tabs" id="filter-tabs" style="margin-bottom:1.25rem;">
    <button class="tab active" data-filter="all">Toutes</button>
    <button class="tab" data-filter="en_attente">En attente</button>
    <button class="tab" data-filter="acceptee">Acceptées</button>
  </div>

  <!-- Reservations table -->
  <div class="card" style="padding:0;">
    <div class="table-wrap">
      <table id="reservations-table">
<thead>
          <tr>
            <th>Référence</th>
            <th class="th-sort" data-sort="date"><span>Date</span><img class="sort-icon" src="asset/sort.svg" width="11" height="11" alt="Trier" /></th>
            <th>Créneau</th>
            <th>Adresse</th>
            <th>Mobilier</th>
            <th>Client</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Prix</th>
            <th class="th-sort" data-sort="statut"><span>Statut</span><img class="sort-icon" src="asset/sort.svg" width="11" height="11" alt="Trier" /></th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="11"><div class="empty"><div class="empty-icon">⏳</div><div class="empty-text">Chargement…</div></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- ── Toast container ── -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ── Calendar modal ── -->
<div class="cal-modal-overlay" id="cal-modal-overlay" hidden>
  <div class="cal-modal" role="dialog" aria-modal="true" aria-labelledby="cal-modal-title">
    <button class="cal-modal-close" id="cal-modal-close" aria-label="Fermer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="cal-modal-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </div>
    <h2 class="cal-modal-title" id="cal-modal-title">
      Réservation confirmée
      <img src="asset/check-email.png" alt="✓" width="24" height="24" style="vertical-align:middle;margin-left:6px;display:inline-block;">
    </h2>
    <p class="cal-modal-desc" id="cal-modal-desc"></p>
    <button class="btn btn-primary cal-modal-btn" id="cal-modal-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Ajouter à l'agenda
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
